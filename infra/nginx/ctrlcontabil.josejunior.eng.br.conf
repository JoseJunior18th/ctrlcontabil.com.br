server {
    listen 80;
    server_name www.ctrlcontabil.josejunior.eng.br;
    return 301 https://ctrlcontabil.josejunior.eng.br$request_uri;
}

server {
    listen 80;
    server_name ctrlcontabil.josejunior.eng.br;
    return 301 https://ctrlcontabil.josejunior.eng.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.ctrlcontabil.josejunior.eng.br;

    ssl_certificate /etc/ssl/certs/evoJJ.crt;
    ssl_certificate_key /etc/ssl/private/evoJJ.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    return 301 https://ctrlcontabil.josejunior.eng.br$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ctrlcontabil.josejunior.eng.br;

    server_tokens off;
    access_log /var/log/nginx/ctrlcontabil.josejunior.eng.br.access.log;
    error_log /var/log/nginx/ctrlcontabil.josejunior.eng.br.error.log warn;
    client_max_body_size 2m;
    keepalive_timeout 15s;
    autoindex off;
    limit_req_status 429;
    limit_conn_status 429;

    ssl_certificate /etc/ssl/certs/evoJJ.crt;
    ssl_certificate_key /etc/ssl/private/evoJJ.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # Cabecalhos de seguranca aplicados a todas as respostas.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=(), payment=(), usb=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-site" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; form-action 'self' https:; object-src 'none'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; upgrade-insecure-requests" always;

    location ~ ^/auth/(login|callback|session|logout|backchannel-logout)$ {
        proxy_pass http://127.0.0.1:5075;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:5075;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location ^~ /saml/ {
        proxy_pass http://127.0.0.1:5075;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location = /healthz {
        proxy_pass http://127.0.0.1:5075;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location / {
        autoindex off;
        proxy_pass http://127.0.0.1:8230;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
